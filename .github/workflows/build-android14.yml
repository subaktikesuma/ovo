name: Android14 Kernel Module Build

on:
  workflow_dispatch:

jobs:
  build:
    name: GKI Kernel Module Build
    runs-on: ubuntu-latest
    env:
      KERNEL_DIR: android-kernel
      MODULE_DIR: ovo
      PREBUILT_KERNEL: https://ci.android.com/builds/latest/branches/aosp_kernel-common-android14-6.1/grid?

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            flex \
            bison \
            libssl-dev \
            libelf-dev \
            bc \
            python3 \
            git \
            ccache \
            wget \
            unzip

      - name: Download Prebuilt GKI Kernel
        run: |
          mkdir -p $KERNEL_DIR
          wget ${{ env.PREBUILT_KERNEL }} -O kernel.zip
          unzip kernel.zip -d $KERNEL_DIR

      - name: Build Kernel Module
        run: |
          cd $MODULE_DIR
          make -C $KERNEL_DIR M=$PWD modules
          ls -lh *.ko

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-module
          path: ${{ env.MODULE_DIR }}/*.ko
