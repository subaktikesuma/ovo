name: Android14 Kernel Module Build

on:
  workflow_dispatch:

jobs:
  build:
    name: GKI Kernel Module Build
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: 6.1.75
            tag: android14-6.1
            patch-level: 2024-06
            arch: aarch64
          
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # Important for getting all Git history

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            flex \
            bison \
            libssl-dev \
            libelf-dev \
            bc \
            python3 \
            git \
            ccache \
            bazel \
            bazel-6.4.0

      - name: Prepare ABI Files
        run: |
          mkdir -p android-kernel/common/android/
          # Create empty ABI file if missing (may need actual content for production)
          touch android-kernel/common/android/abi_gki_protected_exports_aarch64

      - name: Run GKI Kernel Build Action
        uses: ./
        with:
          arch: ${{ matrix.arch }}
          tag: ${{ matrix.tag }}-${{ matrix.patch-level }}
          simple-tag: ${{ matrix.tag }}
          version: ${{ matrix.version }}
          fast_build: true
          module-name: ovo
          module-path: ovo
